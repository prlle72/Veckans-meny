<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatSmart</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont;
    margin: 0;
    background: #f5f5f7;
    color: #111;
}

.container {
    padding: 20px;
    max-width: 600px;
    margin: auto;
}

h1 {
    font-size: 34px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #0a84ff;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

.card {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
}

.price {
    display: flex;
    justify-content: space-between;
}
.green {
    color: green;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🇸🇪 MatSmart</h1>
<p>Recept → billigaste inköpslista</p>

<input id="url" placeholder="Klistra in receptlänk...">

<button onclick="loadRecipe()">Analysera recept</button>

<div id="result"></div>

</div>

<script>
function loadRecipe() {

    const result = document.getElementById("result");

    // DEMO DATA (sen kopplar vi AI)
    const recipe = {
        title: "Tacopaj",
        ingredients: [
            "500g köttfärs",
            "1 gul lök",
            "1 påse tacokrydda",
            "2 dl ost"
        ]
    };

    const prices = {
        ICA: 212,
        Willys: 189
    };

    let html = `
        <div class="card">
            <h2>${recipe.title}</h2>
            <p><b>Ingredienser:</b></p>
            <ul>
                ${recipe.ingredients.map(i => `<li>${i}</li>`).join("")}
            </ul>
        </div>

        <div class="card">
            <h3>💰 Prisjämförelse</h3>

            <div class="price">
                <span>ICA</span><span>${prices.ICA} kr</span>
            </div>

            <div class="price">
                <span>Willys</span><span>${prices.Willys} kr</span>
            </div>

            <p class="green">
                Billigast: Willys (spara ${prices.ICA - prices.Willys} kr)
            </p>
        </div>
    `;

    result.innerHTML = html;
}
</script>

</body>
</html>
